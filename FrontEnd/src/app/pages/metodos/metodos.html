<div class="border-b-8 border-[#ffb703] w-full"></div>

<div class="px-10 py-10">

  <div class="grid grid-cols-1 md:grid-cols-2 gap-10">

    <div>
      <h2 class="text-[#0f2c63] text-3xl font-bold text-center mb-8">Item</h2>

      <div class="space-y-8">

        <input 
          type="text"
          placeholder="Producto"
          [(ngModel)]="producto"
          class="border-2 border-[#0f2c63] rounded-3xl w-full px-6 py-3 text-xl"
        />

        <input 
          type="date"
          [(ngModel)]="fecha"
          class="border-2 border-[#0f2c63] rounded-3xl w-full px-6 py-3 text-xl"
        />


      </div>
    </div>

    <div>
      <h2 class="text-[#0f2c63] text-3xl font-bold text-center mb-8">Acciones</h2>

      <div class="flex flex-col gap-5">

        <button (click)="predecirStockProducto()"
                class="bg-[#0f2c63] text-white border-4 border-[#ffb703] rounded-full px-8 py-4 text-xl">
          Predecir stock del producto
        </button>

        <button (click)="predecirFechaCompleta()"
                class="bg-[#0f2c63] text-white border-4 border-[#ffb703] rounded-full px-8 py-4 text-xl">
          Predicción completa por fecha
        </button>

        <button (click)="productosEnRiesgo()"
                class="bg-[#0f2c63] text-white border-4 border-[#ffb703] rounded-full px-8 py-4 text-xl">
          Productos en riesgo de agotarse
        </button>

        <button (click)="predecirAgotamiento()"
                class="bg-[#0f2c63] text-white border-4 border-[#ffb703] rounded-full px-8 py-4 text-xl">
          Fecha de agotamiento del producto
        </button>

        <label class="bg-[#0f2c63] cursor-pointer text-white border-4 border-[#ffb703] rounded-full px-8 py-4 text-xl text-center">
          Subir CSV / Reentrenar
          <input type="file" hidden (change)="subirCSV($event)" />
        </label>

      </div>

      <!-- RESULTADOS -->
      <div class="border-4 border-[#0f2c63] rounded-3xl p-6 text-[#0f2c63] text-xl text-center mt-8">
        <ng-container *ngIf="!loading && respuesta">
          {{ respuesta }}
        </ng-container>

        <div *ngIf="loading" class="animate-pulse">
          Procesando...
        </div>

        <div *ngIf="error" class="text-red-500">
          {{ error }}
        </div>
      </div>
    </div>
  </div>

  <!-- TABLA DE PREDICCIONES -->
<div *ngIf="predicciones.length > 0" 
     class="mt-10 w-full md:w-10/12 lg:w-8/12 mx-auto">

  <h3 class="text-[#0f2c63] text-2xl font-semibold mb-4 text-center">
    Lista de predicciones
  </h3>

  <div class="overflow-x-auto">
    <table class="min-w-full bg-white border border-gray-300 rounded-xl shadow">

      <thead class="bg-[#0f2c63] text-white">
        <tr>
          <th class="px-6 py-3 text-left">Producto</th>
          <th class="px-6 py-3 text-left">Stock Predicho</th>
        </tr>
      </thead>

      <tbody>
        <tr *ngFor="let p of predicciones" 
            class="border-b hover:bg-gray-100">

          <td class="px-6 py-3">{{ p.product_name }}</td>
          <td class="px-6 py-3">{{ p.predicted_stock }}</td>

        </tr>
      </tbody>

    </table>
  </div>
</div>

  <div class="mt-10">
    <input
      placeholder="Respuesta"
      class="border-2 border-[#0f2c63] rounded-3xl w-full px-6 py-4 text-xl"
      [value]="respuesta"
      readonly
    />
  </div>

</div>
